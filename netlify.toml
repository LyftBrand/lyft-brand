# ═══════════════════════════════════════════════════════
#  LYFT BRAND — Netlify Configuration
#  Transformação automática de imagem + headers de cache
# ═══════════════════════════════════════════════════════

[build]
  publish = "."

# ── Transformação automática de imagem ──
# Qualquer JPG/PNG que a Ju subir é servido como WebP automaticamente
# Ela não precisa converter nada — o Netlify faz isso na entrega
[images]
  remote_images = ["https://lyftbrand.com.br/.*"]

# ── Headers de cache e performance ──
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/fotos/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/hero/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.mp4"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/produtos.json"
  [headers.values]
    Cache-Control = "public, max-age=300"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ── Redirect www → sem www ──
[[redirects]]
  from = "https://www.lyftbrand.com.br/*"
  to = "https://lyftbrand.com.br/:splat"
  status = 301
  force = true

# ── Página 404 customizada (opcional) ──
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
